<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>페이지를 찾을 수 없다 | 성수 데이트 아틀라스</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Manrope:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f6efe3;
        --text: #1a1511;
        --soft: rgba(26, 21, 17, 0.7);
        --accent: #8d4720;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: linear-gradient(180deg, #fbf6ee, #f1e5d2);
        color: var(--text);
        font-family: "Manrope", sans-serif;
      }

      main {
        width: min(100%, 720px);
        padding: 32px;
        border-radius: 28px;
        background: rgba(255, 249, 240, 0.82);
        border: 1px solid rgba(90, 61, 33, 0.1);
      }

      h1 {
        margin: 0 0 12px;
        font-family: "Fraunces", serif;
        font-size: clamp(2.3rem, 1.4rem + 3vw, 4.6rem);
        line-height: 0.95;
        letter-spacing: -0.06em;
      }

      p {
        margin: 0 0 18px;
        color: var(--soft);
        line-height: 1.7;
      }

      a {
        display: inline-flex;
        min-height: 48px;
        align-items: center;
        justify-content: center;
        padding: 0.9rem 1.2rem;
        border-radius: 999px;
        background: #1a1511;
        color: #fff7eb;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>길을 잠깐 놓쳤다.</h1>
      <p>
        찾으려던 페이지가 없거나 주소가 바뀌었다. 성수 데이트 가이드 본문으로 돌아가서
        코스를 다시 고르면 된다.
      </p>
      <a href="./index.html">메인 가이드로 돌아가기</a>
    </main>
  </body>
</html>
